services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: mbd-elasticsearch
    environment:
      - node.name=mbd-es
      - cluster.name=mbd-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.license.self_generated.type=basic
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cat/health?h=status | grep -qE 'green|yellow'"]
      interval: 20s
      timeout: 10s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.2
    container_name: mbd-logstash
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logs:/mbd/logs:ro
      - logstash_data:/usr/share/logstash/data
    ports:
      - "9600:9600"
    depends_on:
      elasticsearch:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9600/ | grep -q green"]
      interval: 20s
      timeout: 10s
      retries: 15

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: mbd-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q available"]
      interval: 20s
      timeout: 10s
      retries: 15

  setup:
    image: alpine:3.19
    container_name: mbd-setup
    volumes:
      - ./elk/setup.sh:/setup/setup.sh:ro
      - ./elk/elasticsearch/index-template.json:/setup/index-template.json:ro
      - ./elk/elasticsearch/display-alias.json:/setup/display-alias.json:ro
      - ./elk/kibana/kpi-vega.ndjson:/setup/kpi-vega.ndjson:ro
      - ./elk/kibana/dashboard.ndjson:/setup/dashboard.ndjson:ro
      - ./elk/kibana/display-filter.ndjson:/setup/display-filter.ndjson:ro
      - ./elk/kibana/display-dashboard.ndjson:/setup/display-dashboard.ndjson:ro
    entrypoint: ["sh", "-c", "apk add --no-cache curl && sh /setup/setup.sh"]
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    restart: "no"

volumes:
  esdata:
    driver: local
  logstash_data:
    driver: local
