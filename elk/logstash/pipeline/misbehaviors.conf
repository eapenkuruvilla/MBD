input {
  file {
    path            => "/mbd/logs/misbehaviors.log"
    start_position  => "beginning"
    sincedb_path    => "/dev/null"
    codec           => "json"
    mode            => "read"
    file_completed_action => "log"
    file_completed_log_path => "/tmp/logstash_done.log"
  }
}

filter {
  # Truncate microseconds → milliseconds so ISO8601 parses cleanly
  mutate {
    gsub => ["detected_at", "(\\.\\d{3})\\d+", "\\1"]
  }

  # Use detected_at as the canonical event time
  date {
    match => ["detected_at", "ISO8601"]
    target => "@timestamp"
  }

  # Build geo_point from lat / lon
  mutate {
    rename => {
      "lat" => "[location][lat]"
      "lon" => "[location][lon]"
    }
    convert => {
      "[location][lat]" => "float"
      "[location][lon]" => "float"
      "speed_kmh"         => "float"
      "threshold_kmh"     => "float"
      "speed_raw"         => "integer"
      "accel_g"           => "float"
      "accel_ms2"         => "float"
      "threshold_g"       => "float"
      "accel_raw"         => "integer"
      "jump_m"            => "float"
      "elapsed_s"         => "float"
      "implied_speed_kmh" => "float"
      "prev_lat"          => "float"
      "prev_lon"          => "float"
      "reported_heading"  => "float"
      "gps_bearing"       => "float"
      "heading_diff"      => "float"
      "threshold_deg"     => "float"
      "distance_m"        => "float"
    }
  }

  # Drop Logstash housekeeping fields
  mutate {
    remove_field => ["@version", "host", "log", "event", "message"]
  }
}

output {
  elasticsearch {
    hosts       => ["http://elasticsearch:9200"]
    index       => "mbd-misbehaviors"
    document_id => "%{event_id}"
    action      => "index"
  }
}
