input {
  file {
    path            => "/mbd/logs/misbehaviors.log"
    start_position  => "beginning"
    sincedb_path    => "/usr/share/logstash/data/sincedb_misbehaviors"
    codec           => "json"
    mode            => "read"
    file_completed_action => "log"
    file_completed_log_path => "/tmp/logstash_done.log"
  }
}

filter {
  # Truncate microseconds → milliseconds so ISO8601 parses cleanly
  mutate {
    gsub => ["detected_at", "(\\.\\d{3})\\d+", "\\1"]
  }

  # Use detected_at as the canonical event time
  date {
    match => ["detected_at", "ISO8601"]
    target => "@timestamp"
  }

  # Build geo_point from lat / lon
  mutate {
    rename => {
      "lat" => "[location][lat]"
      "lon" => "[location][lon]"
    }
    convert => {
      "[location][lat]" => "float"
      "[location][lon]" => "float"
      "speed_mph"       => "float"
      "threshold_mph"   => "float"
      "speed_raw"       => "integer"
    }
  }

  # Drop Logstash housekeeping fields
  mutate {
    remove_field => ["@version", "host", "log", "event", "message"]
  }
}

output {
  elasticsearch {
    hosts       => ["http://elasticsearch:9200"]
    index       => "mbd-misbehaviors-%{+YYYY.MM.dd}"
    document_id => "%{vehicle_id}_%{detected_at}"
    action      => "index"
  }
}
